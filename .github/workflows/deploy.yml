name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger cPanel pull and deploy
        uses: pinkasey/cpanel-deploy-action@v1.2.0
        with:
          hostname: ${{ secrets.CPANEL_HOST }}
          cpanel_token: ${{ secrets.CPANEL_TOKEN }}
          cpanel_username: ${{ secrets.CPANEL_USERNAME }}
          repository_root: /home/nhanceco/action/repository/Backend
          branch: main